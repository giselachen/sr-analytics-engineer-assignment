version: 2

models:
  - name: external_entities_ownership
    description: > 
      External Entities Ownership table contains aggregate information about the ownership 
      of external entities in Datahub. Each row represents the count of each entity type 
      per owner with the owner's title. External entities include datasets and dashboards.
    docs:
      node_color: green

    columns:
      # primary key
      - name: external_entities_ownership_id
        description: >
          Unique identifier composed of the entity type, user name and user title. 
        tests:
          - unique
          - not_null

      # dimensions
      - name: external_entity_type
        description: >
          The type of external entity represented in the Datahub entity model.
        tests:
          - accepted_values:
              values: ['dataset', 'dashboard']

      - name: user_name
        description: >
          Username for the entity owner. It's generally the email address of the user. 

      - name: user_title
        description: >
          Title of the user in the organization.

      # measures
      - name: distinct_id_count
        description: >
          Count of distinct external entity ids owned by the user.